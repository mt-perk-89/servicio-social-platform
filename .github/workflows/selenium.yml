name: Selenium Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BASE_URL: http://127.0.0.1:3000

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar pnpm compatible
        run: |
          npm install -g pnpm@9
          echo "$(npm bin -g)" >> $GITHUB_PATH
          echo "pnpm binary path: $(npm bin -g)"
          pnpm --version

      - name: Instalar dependencias de Node
        run: |
          pnpm install --frozen-lockfile

      - name: Instalar dependencias de Python
        run: |
          pip install pytest selenium webdriver-manager

      - name: Iniciar aplicación Next.js
        run: |
          pnpm exec next dev --hostname 127.0.0.1 --port 3000 > /tmp/next.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:3000 >/dev/null; then
              echo "Servidor Next.js listo"
              exit 0
            fi
            sleep 2
          done
          echo "No se pudo iniciar el servidor Next.js"
          cat /tmp/next.log
          exit 1

      - name: Ejecutar pruebas unitarias (pytest)
        run: |
          pytest pruebas -v

      - name: Ejecutar pruebas Selenium
        run: |
          python automation/test_login.py