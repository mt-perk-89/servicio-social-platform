name: Selenium Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BASE_URL: http://127.0.0.1:3000
      NEO4J_URI: ${{ secrets.NEO4J_URI }}
      NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
      NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
      NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar pnpm compatible
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm --version

      - name: Instalar dependencias de Node
        run: |
          pnpm install --frozen-lockfile

      - name: Instalar dependencias de Python
        run: |
          pip install pytest selenium webdriver-manager

      - name: Iniciar aplicación Next.js
        run: |
          pnpm exec next dev --hostname 127.0.0.1 --port 3000 > /tmp/next.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:3000 >/dev/null; then
              echo "Servidor Next.js listo"
              exit 0
            fi
            sleep 2
          done
          echo "No se pudo iniciar el servidor Next.js"
          cat /tmp/next.log
          exit 1

      - name: Verificar variables de entorno de Neo4j
        run: |
          echo "NEO4J_URI set: ${NEO4J_URI:+yes}"
          echo "NEO4J_USERNAME set: ${NEO4J_USERNAME:+yes}"
          echo "NEO4J_PASSWORD set: ${NEO4J_PASSWORD:+yes}"
          echo "NEO4J_DATABASE set: ${NEO4J_DATABASE:+yes}"
          echo "BASE_URL=$BASE_URL"

      - name: Sembrar base de datos
        run: |
          for i in $(seq 1 30); do
            if response=$(curl -sS -X POST http://127.0.0.1:3000/api/seed 2>&1); then
              echo "Base de datos sembrada correctamente"
              echo "$response"
              exit 0
            fi
            echo "Esperando servidor para seed... (intento $i/30)"
            echo "$response"
            sleep 2
          done
          echo "No se pudo sembrar la base de datos"
          echo "Respuesta final:"
          curl -sS -X POST http://127.0.0.1:3000/api/seed || true
          echo "=== /tmp/next.log ==="
          cat /tmp/next.log
          exit 1

      - name: Ejecutar pruebas unitarias (pytest)
        run: |
          pytest pruebas -v

      - name: Ejecutar pruebas Selenium
        run: |
          python automation/test_login.py